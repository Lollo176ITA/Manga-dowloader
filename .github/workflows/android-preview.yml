name: Android preview APK

concurrency:
  group: android-preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  push:
    branches:
      - dev
    paths:
      - 'android-app/**'
      - '.github/workflows/android-preview.yml'
  workflow_dispatch:

jobs:
  build-preview:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-app/release-keystore.jks
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main metadata
        run: git fetch origin main --depth=1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve preview version
        run: |
          MAIN_VERSION="$(git show origin/main:android-app/version.properties | grep '^versionName=' | cut -d= -f2-)"
          test -n "$MAIN_VERSION" || { echo "Missing main versionName"; exit 1; }

          IFS='.' read -r MAJOR MINOR PATCH <<< "$MAIN_VERSION"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          NEXT_PATCH=$((PATCH + 1))
          BASE_VERSION="$MAJOR.$MINOR.$NEXT_PATCH"
          BASE_VERSION_REGEX="${MAJOR}\\.${MINOR}\\.${NEXT_PATCH}"

          MAX_PREVIEW=0
          while IFS= read -r TAG_NAME; do
            if [[ "$TAG_NAME" =~ ^android-preview-v${BASE_VERSION_REGEX}-preview\.([0-9]+)$ ]]; then
              NUMBER="${BASH_REMATCH[1]}"
              if [ "$NUMBER" -gt "$MAX_PREVIEW" ]; then
                MAX_PREVIEW="$NUMBER"
              fi
            fi
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,isPrerelease --jq '.[] | select(.isPrerelease == true) | .tagName')

          PREVIEW_NUMBER=$((MAX_PREVIEW + 1))
          if [ "$PREVIEW_NUMBER" -gt 98 ]; then
            echo "Preview limit reached for $BASE_VERSION. Bump the stable version on main before publishing more previews."
            exit 1
          fi

          VERSION_NAME="$BASE_VERSION-preview.$PREVIEW_NUMBER"
          BASE_VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + NEXT_PATCH))
          VERSION_CODE=$((BASE_VERSION_CODE * 100 + PREVIEW_NUMBER))
          RELEASE_TAG="android-preview-v$VERSION_NAME"

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$(dirname "$ANDROID_KEYSTORE_PATH")"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          test -s "$ANDROID_KEYSTORE_PATH" || { echo "Decoded keystore is empty"; exit 1; }

      - name: Build preview APK
        run: |
          ./gradlew assembleRelease \
            -PappVersionNameOverride="$VERSION_NAME" \
            -PappVersionCodeOverride="$VERSION_CODE" \
            --stacktrace

      - name: Create or update GitHub pre-release
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Android preview $VERSION_NAME" \
              --notes "APK preview $VERSION_NAME" \
              --prerelease
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Android preview $VERSION_NAME" \
              --notes "APK preview $VERSION_NAME" \
              --prerelease
          fi

      - name: Upload APK to GitHub pre-release
        run: |
          gh release upload "$RELEASE_TAG" \
            app/build/outputs/apk/release/app-release.apk#app-release.apk \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-downloader-preview
          path: android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
