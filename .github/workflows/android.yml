name: Android release APK

concurrency:
  group: android-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-app/release-keystore.jks
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$(dirname "$ANDROID_KEYSTORE_PATH")"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          test -s "$ANDROID_KEYSTORE_PATH" || { echo "Decoded keystore is empty"; exit 1; }
          echo "Decoded keystore size: $(wc -c < "$ANDROID_KEYSTORE_PATH") bytes"

      - name: Verify keystore
        run: |
          set +e
          keytool -list \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            > /tmp/keystore-check.stdout 2> /tmp/keystore-check.stderr
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Failed to open keystore. This usually means ANDROID_KEYSTORE_BASE64 or ANDROID_KEYSTORE_PASSWORD is wrong."
            cat /tmp/keystore-check.stderr
            exit "$status"
          fi

          set +e
          keytool -list \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            > /tmp/alias-check.stdout 2> /tmp/alias-check.stderr
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Keystore opened, but the alias check failed. ANDROID_KEY_ALIAS does not exist in this keystore."
            cat /tmp/alias-check.stderr
            exit "$status"
          fi

          mkdir -p /tmp/signing-check
          printf 'signing check\n' > /tmp/signing-check/check.txt
          jar --create --file /tmp/signing-check.jar -C /tmp/signing-check check.txt

          set +e
          jarsigner \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            /tmp/signing-check.jar "$ANDROID_KEY_ALIAS" \
            > /tmp/signing-check.stdout 2> /tmp/signing-check.stderr
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Keystore and alias are valid, but signing failed. ANDROID_KEY_PASSWORD does not match the selected key."
            cat /tmp/signing-check.stderr
            exit "$status"
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Read app version
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION_NAME="$(grep '^versionName=' version.properties | cut -d= -f2-)"
          test -n "$VERSION_NAME" || { echo "Missing versionName in version.properties"; exit 1; }
          RELEASE_TAG="android-v$VERSION_NAME"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Android $VERSION_NAME"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Android $VERSION_NAME" \
              --notes "APK release $VERSION_NAME"
          fi

      - name: Upload APK to GitHub release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            app/build/outputs/apk/release/app-release.apk#app-release.apk \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: manga-downloader-release
          path: android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
